<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="card text-center">
            <div class="card-header">RPG IAN</div>
            <div class="card-body" id="tela"style="background-image: url('assets/fundo.jpg'); background-size: cover; background-position: center;">
            <p class="card-text"> Turno 1 </p>
            <div class="row">
                <div class="col text-start" id="col-heroi">
                    <ul class="list-group float-start" style="width: 225px;">
                        <li id="nome-heroi" class="list-group-item">Master chief</li>
                        <li id="titulo-heroi" class="list-group-item">⚔️</li>
                        <li id="hp-heroi" class="list-group-item">❤️ <progress id="hp-heroi" value="100" max="100"
                                style="accent-color: red;"></progress></li>
                        <li id="mp-heroi" class="list-group-item">🧪 <progress id="mp-heroi" value="100"
                                max="100"></progress></li>
                        <li id="en-heroi" class="list-group-item">⚡<progress id="en-heroi" value="0" max="100"
                                style="accent-color: orange;"></progress></li>
                    </ul>
                </div>
                <div class="col" id="col-boss">
                    <ul class="list-group float-end" style="width: 225px;">
                        <li id="nome-boss" class="list-group-item">Bicho de fogo</li>
                        <li id="titulo-boss" class="list-group-item">⚔️</li>
                        <li id="hp-boss" class="list-group-item">❤️ <progress id="hp-boss" value="100" max="100"
                                style="accent-color: red;"></progress></li>
                        <li id="mp-boss" class="list-group-item">🧪 <progress id="mp-boss" value="100"
                                max="100"></progress></li>
                    </ul>
                </div>
            </div>
            <div class="row">
                <div class="col text-end" id="col-botoes">
                    <img src="assets/chief.gif" width="300px" height="200px">
                </div>
                <div class="col text-start" id="col-msg">
                    <img src="assets/macaco_paulo.gif" width="200px" height="200px">
                </div>
            </div>
            <div class="card-footer"></div>
            <div class="col text-center" id="col-comandos">
                    <button id="atk" class="btn btn-danger">Atacar</button>
                    <button id="def" class="btn btn-primary">Defender</button>
                    <button id="mag" class="btn btn-success">Magia</button>
        </div> <!-- card -->
    </div> <!-- container -->
</body>

</html>
