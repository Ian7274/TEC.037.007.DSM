<script>
   let msg = "Digite sua idade: "
   const idade = prompt(msg)
   function verificarIdade(idade) {
     if (idade >= 18) {
        return "autorizado a dirigir";
     } else {
       let anosFaltando = 18 - idade;
       return "não autorizado a dirigir. Faltam " + anosFaltando + " anos";
     }
   }
    let habilitavel = verificarIdade(idade);
    alert(habilitavel);
</script>
